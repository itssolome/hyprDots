# Programs
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$menuCli = wofi --show run
$browser = zen-browser

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod CTRL, F, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, O, exec, $menu
bind = $mainMod SHIFT, O, exec, $menuCli
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, exec, $browser
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod ALT, W, exec, killall waybar && waybar
bind = ALT, W, exec, waybar
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod SHIFT, N, exec, hyprsunset --temperature 2800
bind = $mainMod SHIFT, D, exec, killall -9 hyprsunset
bind = $mainMod SHiFT, L, exec, hyprlock

# Screenshot
bind = CTRL SHIFT, S, exec, hyprshot -m window
bind = CTRL ALT, S, exec, hyprshot -m output
bind = $mainMod CTRL, S, exec, hyprshot -m region

# Move focus with mainMod + arrow keys/hekj
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, H, movefocus, l
bind = ALT, E, movefocus, r
bind = ALT, K, movefocus, u
bind = ALT, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/Scripts/volume --inc
bindel = $mainMod CTRL, U, exec, ~/.config/hypr/Scripts/volume --inc

bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/Scripts/volume --dec
bindel = $mainMod CTRL, P, exec, ~/.config/hypr/Scripts/volume --dec

bindel = ,XF86AudioMute, exec, ~/.config/hypr/Scripts/volume --toggle
bindel = $mainMod CTRL, M, exec, ~/.config/hypr/Scripts/volume --toggle

bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/Scripts/brightness --inc
bindel = $mainMod SHIFT, U, exec, ~/.config/hypr/Scripts/brightness --inc

bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/Scripts/brightness --dec
bindel = $mainMod SHIFT, P, exec, ~/.config/hypr/Scripts/brightness --dec

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = CTRL ALT, N, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = CTRL ALT, SPACE, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = CTRL ALT, P, exec, playerctl previous

